name: Build Custom Kernel r5q (OneUI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison flex libssl-dev make \
          libelf-dev dwarves \
          gcc-aarch64-linux-gnu \
          clang llvm lld \
          git zip unzip

    - name: Setup build environment
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV
        echo "CC=clang" >> $GITHUB_ENV
        echo "LLVM=1" >> $GITHUB_ENV
        echo "LLVM_IAS=1" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

    - name: Clean source
      run: make mrproper

    - name: Load defconfig
      run: make r5q_eur_open_defconfig

    - name: Build kernel
      run: |
        make -j$(nproc)

    - name: Prepare AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git
        rm -rf AnyKernel3/.git AnyKernel3/README.md
        cp arch/arm64/boot/Image AnyKernel3/
        if [ -f arch/arm64/boot/dtbo.img ]; then
          cp arch/arm64/boot/dtbo.img AnyKernel3/
        fi

    - name: Zip flashable kernel
      run: |
        cd AnyKernel3
        zip -r9 ../Custom-r5q-OneUI-Kernel.zip *

    - name: Upload kernel zip
      uses: actions/upload-artifact@v4
      with:
        name: Custom-r5q-OneUI-Kernel
        path: Custom-r5q-OneUI-Kernel.zip
