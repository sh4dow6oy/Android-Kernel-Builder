name: Build Kernel + AnyKernel3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Dependințe
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential bc bison flex libssl-dev \
            libncurses5-dev libelf-dev git curl wget xz-utils zip

      # 2. Clone kernel sursă (rawr-bpf)
      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch rawr-bpf \
            https://github.com/LumiPlayground/android_kernel_samsung_sm8150 kernel

      # 3. Download și extract toolchain Linaro
      - name: Download Linaro AArch64 GCC
        run: |
          mkdir -p toolchain/gcc
          wget https://releases.linaro.org/components/toolchain/binaries/latest-9/aarch64-linux-gnu/gcc-linaro-9.5.0-2020.12-x86_64_aarch64-linux-gnu.tar.xz \
            -O toolchain/gcc/gcc-linaro.tar.xz
          cd toolchain/gcc
          tar -xvf gcc-linaro.tar.xz --strip-components=1 -J
          cd ../..

      # 4. Clone Clang
      - name: Clone Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang kernel/toolchain/llvm-arm-toolchain-ship

      # 5. Clone AnyKernel3
      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel

      # 6. Build kernel + dtbo
      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          mkdir -p out

          BUILD_CROSS_COMPILE=$(pwd)/../toolchain/gcc/bin/aarch64-linux-gnu-
          KERNEL_LLVM_BIN=$(pwd)/toolchain/llvm-arm-toolchain-ship/bin/clang
          CLANG_TRIPLE=aarch64-linux-gnu-
          KERNEL_MAKE_ENV="DTC_EXT=$(pwd)/tools/dtc CONFIG_BUILD_ARM64_DT_OVERLAY=y"

          # defconfig
          make -j$(nproc) O=out \
            $KERNEL_MAKE_ENV \
            ARCH=arm64 \
            CROSS_COMPILE=$BUILD_CROSS_COMPILE \
            REAL_CC=$KERNEL_LLVM_BIN \
            CLANG_TRIPLE=$CLANG_TRIPLE \
            r5q_eur_open_defconfig

          # build kernel
          make -j$(nproc) O=out \
            $KERNEL_MAKE_ENV \
            ARCH=arm64 \
            CROSS_COMPILE=$BUILD_CROSS_COMPILE \
            REAL_CC=$KERNEL_LLVM_BIN \
            CLANG_TRIPLE=$CLANG_TRIPLE

          # build dtbo.img
          make -j$(nproc) O=out dtbo.img

      # 7. Build flashable ZIP AnyKernel3
      - name: Create flashable zip
        run: |
          cp kernel/out/arch/arm64/boot/Image anykernel/
          cp kernel/out/arch/arm64/boot/dtbo.img anykernel/ 2>/dev/null || true
          cd anykernel
          export ZIP_NAME="Kernel-rawr-bpf-$(date +%Y%m%d).zip"
          zip -r9 ../$ZIP_NAME *

      # 8. Upload ZIP
      - name: Upload flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: Kernel-*.zip
